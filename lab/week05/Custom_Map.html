<!DOCTYPE html>
<html>
<head>
    <title>George Rodriguez First Web Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>

    <script>
        var map = L.map('map').fitWorld();

        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        var KyleField = [30.6099, -96.3404];
        var OMBuilding = [ 30.6177, -96.3367];
        var AcademicBuilding = [30.6157, -96.3408];

        map.locate({setView: true, maxZoom: 16});

        function onLocationFound(e) {
            var radius = e.accuracy / 2;

            L.marker(e.latlng).addTo(map)
                .bindPopup("You are within " + radius.toFixed(0) + " meters from this point.")
                .openPopup();

            L.circle(e.latlng, {
                radius: radius,
                color: 'blue',
                fillColor: '#3388ff',
                fillOpacity: 0.2
            }).addTo(map);
        }

        function onLocationError(e) {
            map.setView(KyleField, 15);
            alert("Location access was denied or unavailable. Map centered on Kyle Field.");
        }

        var KyleCircle = L.circle(KyleField, {
            color: 'maroon',
            fillColor: '#800000',
            fillOpacity: 0.3,
            radius: 250
        }).addTo(map);

        KyleCircle.bindPopup("Kyle Field");

        var schoolIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/128/15742/15742907.png',
            iconSize: [35, 35],
            iconAnchor: [17, 35],
            popupAnchor: [0, -35]
        });

        var OMMarker = L.marker(OMBuilding, {icon: schoolIcon}).addTo(map);
        OMMarker.bindPopup("O&amp;M Building");

        var AcademicMarker = L.marker(AcademicBuilding, {icon: schoolIcon}).addTo(map);
        AcademicMarker.bindPopup("Academic Building");

        var popup = L.popup();

        function onMapClick(e) {
            popup
                .setLatLng(e.latlng)
                .setContent("Coordinates: " + e.latlng.lat.toFixed(4) + ", " + e.latlng.lng.toFixed(4))
                .openOn(map);
        }

        map.on('locationfound', onLocationFound);
        map.on('locationerror', onLocationError);
        map.on('click', onMapClick);
    </script>
</body>
</html>
