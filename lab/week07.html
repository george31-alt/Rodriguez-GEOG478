<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Week 07 Highcharts Lab</title>

<script src="https://cdn.jsdelivr.net/npm/highcharts@12/highcharts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highcharts@12/modules/series-label.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highcharts@12/modules/exporting.js"></script>
  <style>
    #container {
      min-width: 310px;
      max-width: 800px;
      height: 400px;
      margin: 0 auto;
    }
  </style>
</head>

<body>
  <div id="container"></div>

  <script>
    Highcharts.chart("container", {
      title: { text: "Weekly Temperature in College Station" },
      subtitle: { text: "Highest and Lowest Temperatures" },

      xAxis: {
        categories: ["Sat", "Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"],
        title: { text: "Day" }
      },

      yAxis: {
        title: { text: "Temperature (°F)" }
      },

      legend: {
        layout: "horizontal",
        align: "center",
        verticalAlign: "bottom"
      },

      series: [
        {
          name: "Highest (°F)",
          data: [82, 81, 81, 70, 77, 78, 79, 80]
        },
        {
          name: "Lowest (°F)",
          data: [67, 59, 50, 47, 51, 60, 66, 66]
        }
      ]
    });
  </script>
</body>
</html>
